# ~/.config/tmuxinator/cb.yml

name: 🛋️cb
root: ~/Code/cb/

windows:
  - 🛋️ cbse-buddy:
      layout: main-vertical
      pane:
        - editor:
          - cd ~/Code/cb/cbse-buddy/ && nvim .
        - shell:
          - cd ~/Code/cb/cbse-buddy/ && git status
  - 🛋️ couchbot:
      layout: main-vertical
      panes:
        - editor:
          - cd ~/Code/couchbot && nvim .
        - dev:
          - cd ~/Code/couchbot && npm run dev
