# ~/.config/tmuxinator/sb.yml

name: 🧪 lab
root: /tmp

windows:
  - 🛋️:
      layout: main-vertical
      panes:
        - editor:
          - cd ~/Code/couchbot && nvim .
        - dev:
          - cd ~/Code/couchbot && npm run dev
  - ⭐:
      layout: main-vertical
      panes:
        - editor:
          - cd ~/Code/scripts/github/fetch-starred/ && nvim .
        - shell:
          - cd ~/Code/scripts/github/fetch-starred/ && clear
  - 🧵:
      layout: main-vertical
      panes:
        - editor:
          - cd ~/Code/raycast-fabric/ && nvim .
        - shell:
          - cd ~/Code/raycast-fabric/ && npm run dev
