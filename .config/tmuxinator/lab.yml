# ~/.config/tmuxinator/sb.yml

name: 🧪lab
root: /tmp

windows:
  - 🔍 btop: btop
  - 🐳 docker:
      layout: main-horizontal
      panes:
        - lazydocker:
          - cd ~/Docker && lazydocker
        - shell:
          - cd ~/Docker && git status
  - 🧵fabric-ai:
      layout: main-vertical
      panes:
        - editor:
          - cd ~/Code/raycast-fabric/ && nvim .
        - shell:
          - cd ~/Code/raycast-fabric/ && npm run dev
