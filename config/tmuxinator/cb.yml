# ~/.config/tmuxinator/cb.yml

name: 🛋️  cb
root: ~/Code/cb/


windows:
  - 📖: nvim .
  - 🤖: claude
  - cbse_buddy:
      layout: main-vertical
      pane:
        - editor:
          - cd ~/Code/cb/cbse-buddy/ && nvim .
        - shell:
          - cd ~/Code/cb/cbse-buddy/ && git status
  - llm_cache: cd ~/Code/cb/cb_llm_cache && source venv/bin/activate && source _env_sample && python app.py
