# Starship prompt — Catppuccin Mocha
# Docs: https://starship.rs/config/
# Symlink target: ~/.config/starship.toml (starship expects a file, not a dir)

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$ruby\
$golang\
$line_break\
$character"""

add_newline = true
palette = "catppuccin_mocha"

# --- Catppuccin Mocha palette -----------------------------------------------
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# --- Line 1: directory, git, language versions ------------------------------

[directory]
style            = "bold blue"
format           = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
read_only        = " "
read_only_style  = "red"

[git_branch]
symbol = " "
style  = "mauve"
format = "[$symbol$branch]($style) "

[git_status]
style         = "peach"
format        = '([$all_status$ahead_behind]($style) )'
conflicted    = "[●](maroon)"
ahead         = "[⇡](teal)"
behind        = "[⇣](teal)"
diverged      = "[⇕](teal)"
up_to_date    = ""
untracked     = ""
stashed       = "[●](lavender)"
modified      = "[●](yellow)"
staged        = "[●](green)"
renamed       = "[●](mauve)"
deleted       = "[●](red)"

# Language versions — align with mise-managed runtimes in config/mise/config.toml.
# Symbols are Nerd Font glyphs (requires CaskaydiaMono NF or similar).
[nodejs]
symbol = " "
style  = "green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style  = "yellow"
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\) )]($style)"

[ruby]
symbol = " "
style  = "red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style  = "teal"
format = "[$symbol($version )]($style)"

# --- Line 2: vi-mode aware prompt character ---------------------------------
# NOTE: starship's vimcmd_symbol is officially supported in zsh/fish/cmd only.
# In bash, the cursor shape change (set in home/_bashrc via readline mode
# strings) is the primary NORMAL/INSERT indicator. This symbol still renders
# safely in bash, it just won't swap on mode change there.
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold lavender)"
